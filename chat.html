
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            background: #1a1a2e;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .chat-header {
            padding: 20px;
            background: #2a2a4a;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-header p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            background: #6c63ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            background: #2a2a4a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
        }
        .chat-input {
            display: flex;
            padding: 12px 16px;
            background: #1a1a2e;
            border-top: 1px solid #333;
            gap: 8px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #2a2a4a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .chat-input input::placeholder {
            color: #666;
        }
        .chat-input button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #6c63ff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-input button:hover {
            background: #5a52d5;
        }
        .status {
            text-align: center;
            padding: 6px;
            font-size: 12px;
            color: #888;
            background: #111;
        }
        .status.sent {
            color: #4caf50;
        }
        .status.error {
            color: #f44336;
        }
        .footer-note {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #222;
        }
        .footer-note a {
            color: #6c63ff;
            text-decoration: none;
        }
        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>💬 Поддержка</h2>
            <p>Напишите нам — ответим в ближайшее время</p>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot">
                Привет! 👋 Задайте свой вопрос, и я передам его менеджеру.
                <span class="time">только что</span>
            </div>
        </div>
        <div class="status" id="status">🟢 Онлайн</div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="Напишите сообщение..." />
            <button id="sendBtn">Отправить</button>
        </div>
        <div class="footer-note">
            <a href="https://t.me/AI_Solutions_bot" target="_blank">📱 Написать в Telegram</a>
        </div>
    </div>

    <script>
        // === ТВОИ ДАННЫЕ ===
        const BOT_TOKEN = "8894799192:AAHgu_i-l42bdgdt1bOJqRk6bhNztJn-IAM";
        const OWNER_ID = "7857085268";
        // ===================

        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = text + ` <span class="time">${time}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            messages.push({ text, sender, time });
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }

        function loadMessages() {
            messagesDiv.innerHTML = '';
            if (messages.length === 0) {
                addMessage('Привет! 👋 Задайте свой вопрос, и я передам его менеджеру.', 'bot');
                return;
            }
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.sender}`;
                div.innerHTML = msg.text + ` <span class="time">${msg.time}</span>`;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addMessage(text, 'user');
            statusDiv.textContent = '⏳ Отправка...';
            statusDiv.className = 'status';

            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: `📩 Новое сообщение с сайта:\n\n${text}`,
                        parse_mode: 'HTML'
                    })
                });

                if (response.ok) {
                    statusDiv.textContent = '✅ Сообщение отправлено!';
                    statusDiv.className = 'status sent';
                } else {
                    statusDiv.textContent = '❌ Ошибка отправки';
                    statusDiv.className = 'status error';
                }
            } catch (error) {
                statusDiv.textContent = '❌ Ошибка соединения';
                statusDiv.className = 'status error';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        loadMessages();
    </script>
</body>
</html>
